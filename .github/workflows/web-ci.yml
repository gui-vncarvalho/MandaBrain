name: web-ci

on:
  push:
    paths:
      - 'mandabrain-v2/apps/web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'mandabrain-v2/apps/web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mandabrain-v2/apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test
